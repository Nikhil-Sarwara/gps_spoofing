<style>
:root{--bg1:#0f0a2a;--bg2:#0a192f;--a1:#7C3AED;--a2:#06B6D4;--a3:#A78BFA;--tx:#e2e8f0;--muted:#94a3b8;--card:#1a1035;--cardb:#1e1640;font-size:16px;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg1);color:var(--tx);overflow:hidden;width:100vw;height:100vh;cursor:none}
h1,h2,h3{font-family:'Instrument Serif',serif;font-weight:400;line-height:1.1}
h1{font-size:clamp(1.8rem,4vw,3rem)}
h2{font-size:clamp(1.4rem,3vw,2.2rem)}
h3{font-size:clamp(1.1rem,2vw,1.6rem)}
p,li{font-size:clamp(0.85rem,1.2vw,1.1rem);line-height:1.5;color:var(--tx)}
.slides{width:100%;height:100%;position:relative}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(1.5rem,4vw,4rem);opacity:0;transform:scale(0.96);transition:opacity .7s ease,transform .7s ease;pointer-events:none;overflow:hidden}
.slide.active{opacity:1;transform:scale(1);pointer-events:auto;z-index:1}
.slide.prev{opacity:.2;transform:scale(0.92)}
.container{width:100%;max-width:1100px;margin:0 auto;position:relative;z-index:2}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(1rem,2vw,2rem);width:100%}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:clamp(1rem,2vw,2rem);width:100%}
.card{background:var(--card);border:1px solid rgba(124,58,237,.2);border-radius:1rem;padding:clamp(1rem,2vw,1.5rem);transition:transform .3s,box-shadow .3s}.card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(124,58,237,.15)}
.stat{background:linear-gradient(135deg,var(--card),var(--cardb));border:1px solid rgba(6,182,212,.15);border-radius:1rem;padding:clamp(1rem,2vw,1.5rem);text-align:center}
.stat h2{background:linear-gradient(135deg,var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:clamp(2rem,5vw,3.5rem)}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;z-index:0;pointer-events:none}
.blob1{background:var(--a1);width:500px;height:500px;top:-10%;left:-15%;animation:float1 20s ease-in-out infinite}
.blob2{background:var(--a2);width:350px;height:350px;top:45%;right:-10%;animation:float2 18s ease-in-out infinite}
.blob3{background:var(--a3);width:400px;height:400px;bottom:-10%;left:35%;animation:float3 22s ease-in-out infinite}
.blob4{background:rgba(124,58,237,.4);width:250px;height:250px;top:60%;left:10%;animation:float1 15s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(40px,-30px)scale(1.1)}66%{transform:translate(-20px,20px)scale(.9)}}
@keyframes float2{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(-30px,25px)scale(1.15)}66%{transform:translate(20px,-15px)scale(.95)}}
@keyframes float3{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(25px,20px)scale(1.05)}66%{transform:translate(-35px,-25px)scale(.9)}}
.reveal{animation:reveal .8s cubic-bezier(.16,1,.3,1) both}
@keyframes reveal{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.spotlight{position:fixed;pointer-events:none;z-index:9999;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.08),transparent 70%);transform:translate(-50%,-50%);transition:left .1s ease-out,top .1s ease-out}
canvas#particles{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
.nav{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);display:flex;gap:.5rem;z-index:100}
.ndot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s}.ndot.active{background:var(--a2);transform:scale(1.4);box-shadow:0 0 10px var(--a2)}
.counter{position:fixed;top:1rem;right:1.5rem;font-size:.8rem;color:var(--muted);z-index:100}
.tag{display:inline-block;padding:.2rem .7rem;border-radius:2rem;font-size:.75rem;font-weight:600}
.tag-violet{background:rgba(124,58,237,.15);color:var(--a3)}.tag-cyan{background:rgba(6,182,212,.15);color:var(--a2)}
.code{font-family:monospace;font-size:.8rem;background:rgba(0,0,0,.3);padding:.2rem .5rem;border-radius:.3rem}
ul{list-style:none;padding:0}ul li{padding:.3rem 0;position:relative;padding-left:1.5rem}ul li:before{content:'▸';position:absolute;left:0;color:var(--a2)}
.katex{font-size:clamp(.9rem,1.3vw,1.1rem)!important}
.particles-slide canvas{opacity:.6}
</style>
</head>

    ctx.fillStyle=g;ctx.font=`${clamp(2,5,3.5)}rem 'Instrument Serif',serif`;
    ctx.fillText('Thank You',w/2,h*.38);
    ctx.fillStyle='#e2e8f0';ctx.font=`${clamp(1,2,1.3)}rem 'Inter',sans-serif`;
    ctx.fillText('Questions?',w/2,h*.48);
    ctx.fillStyle='#94a3b8';ctx.font=`${clamp(.8,1.2,1)}rem 'Inter',sans-serif`;
    ctx.fillText('Nikhil Sarwara  •  Student ID: 224234862',w/2,h*.6);
    ctx.fillText('SIT724 / SIT746  •  Deakin University',w/2,h*.67);
  }
},
];

function clamp(min,pref,max){return `clamp(${min}rem,${pref}vw,${max}rem)`}
let current=0;const total=slidesData.length;
const slidesEl=document.getElementById('slides');
const navEl=document.getElementById('nav');
const counterEl=document.getElementById('counter');
const spotlight=document.getElementById('spotlight');
const canvas=document.getElementById('particles');
const ctx2d=canvas.getContext('2d');

const blobs=`<div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div><div class="blob blob4"></div>`;

function renderSlide(i){
  slidesEl.innerHTML='';
  for(let j=0;j<total;j++){
    const d=slidesData[j];
    const el=document.createElement('div');
    el.className='slide'+(j===i?' active':(j===i-1?' prev':''));
    el.innerHTML=blobs;
    const c=document.createElement('div');c.className='container';
    if(d.html){
      c.innerHTML=d.html;
      el.appendChild(c);
    }else if(d.render){
      const cv=document.createElement('canvas');
      cv.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
      el.appendChild(cv);
      requestAnimationFrame(()=>{
        cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;
        const ctx=cv.getContext('2d');
        d.render({ctx,w:cv.width,h:cv.height});
      });
    }
    slidesEl.appendChild(el);
  }
  if(slidesData[i].particles)canvas.classList.add('particles-slide');else canvas.classList.remove('particles-slide');
  updateNav();counterEl.textContent=`${i+1} / ${total}`;
  setTimeout(renderKatex,100);
}

function renderKatex(){
  try{renderMathInElement(slidesEl,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});}catch(e){}
}
function updateNav(){navEl.innerHTML=Array.from({length:total},(_,i)=>`<div class="ndot${i===current?' active':''}" onclick="goTo(${i})"></div>`).join('');}
function goTo(i){if(i>=0&&i<total){current=i;renderSlide(current);}}

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(current+1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(current-1);});

// Touch
let tx=0;document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});document.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50)goTo(current+(d>0?1:-1));});

// Mouse spotlight
document.addEventListener('mousemove',e=>{spotlight.style.left=e.clientX+'px';spotlight.style.top=e.clientY+'px';});

// Particles
let particles=[];
function initParticles(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  particles=[];
  for(let i=0;i<60;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,o:Math.random()*.5+.2});}
}
function drawParticles(){
  ctx2d.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
    ctx2d.beginPath();ctx2d.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx2d.fillStyle=`rgba(124,58,237,${p.o})`;ctx2d.fill();
  });
  const t=slidesData[current]&&slidesData[current].particles;
  if(t)requestAnimationFrame(()=>{drawParticles();});
}
initParticles();drawParticles();

// Init
renderSlide(0);
window.addEventListener('resize',()=>{initParticles();renderSlide(current);});
goTo(0);

// Eq after KaTeX renders
setTimeout(()=>{
  const eqEl=document.getElementById('eq-gmethod');
  if(eqEl){eqEl.innerHTML='$$\\Delta\\Phi=\\left\\|\\int_{t_1}^{t_2}\\!\\mathbf{a}_{\\text{imu}}(t)dt-(\\mathbf{P}_{\\text{gps},t_2}-\\mathbf{P}_{\\text{gps},t_1})\\right\\|_2$$';renderKatex();}
},500);
</script>
</body>
